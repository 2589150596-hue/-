<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>补单汇总工具</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>补单汇总工具</h1>
    <span class="badge">Web</span>
  </header>

  <!-- 顾客上传区 -->
  <section class="card">
    <h3 class="section-title">顾客上传</h3>
    <div class="customer-upload">
      <label class="input-label">顾客名称</label>
      <input type="text" id="customerName" placeholder="输入顾客名称（必填）" class="input-text">
      <label class="input-label">任务日期</label>
      <input type="date" id="taskDate" class="input-text" style="width:150px">
      <div class="upload-zone-sm" id="customerUploadZone">
        <div class="upload-inner-sm"><span class="upload-icon-sm">&#128194;</span><span>拖拽或点击选择文件</span></div>
        <input type="file" id="customerFileInput" multiple accept=".xlsx,.xls" hidden>
      </div>
      <button class="btn btn-primary" id="btnCustomerUpload">上传</button>
    </div>
    <div id="customerUploadMsg" class="upload-msg"></div>
  </section>

  <!-- 文件选择区 -->
  <section class="card">
    <h3 class="section-title">选择汇总文件 <button class="btn btn-sm" id="btnRefreshFiles">刷新列表</button></h3>
    <div class="select-actions">
      <button class="btn btn-sm" id="btnSelectAll">全选</button>
      <button class="btn btn-sm" id="btnDeselectAll">取消全选</button>
      <button class="btn btn-sm" id="btnBatchDownload" style="color:#1890ff">批量下载</button>
      <button class="btn btn-sm" id="btnBatchDelete" style="color:#ff4d4f">批量删除</button>
      <span id="fileCount" class="count-hint">-</span>
    </div>
    <div class="file-select-table-wrap">
      <table id="fileSelectTable">
        <thead><tr><th style="width:40px"><input type="checkbox" id="checkAll"></th><th>文件名</th><th>上传时间</th><th style="width:100px">操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- 参数设置 -->
  <section class="card config">
    <h3 class="section-title">处理参数</h3>
    <div class="config-row">
      <label>开始时间 <input type="time" id="startTime" value="08:00"></label>
      <label>结束时间 <input type="time" id="endTime" value="23:00"></label>
      <label>刷手数量 <input type="number" id="numWorkers" value="1" min="1" max="20" style="width:70px"></label>
      <label>最小间隔(分) <input type="number" id="minInterval" value="0" min="0" max="120" style="width:70px"></label>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnProcess" disabled>开始处理</button>
      <button class="btn btn-success" id="btnDownload" disabled>下载最新汇总表</button>
    </div>
    <div id="statusBar" class="status-bar">就绪 - 请先勾选要处理的文件</div>
  </section>

  <!-- 结果区 -->
  <section id="resultArea" class="card result" style="display:none">
    <div class="tabs">
      <button class="tab active" data-tab="summary">汇总表</button>
      <button class="tab" data-tab="shop">店铺统计</button>
      <button class="tab" data-tab="file">按文件统计</button>
      <button class="tab" data-tab="customer">按客户统计</button>
      <button class="tab" data-tab="anomaly">异常报告</button>
    </div>
    <div class="stats-row">
      <span>总单量: <strong id="statOrders">0</strong></span>
      <span>文件数: <strong id="statFiles">0</strong></span>
      <span>客户数: <strong id="statCustomers">0</strong></span>
      <span>店铺数: <strong id="statShops">0</strong></span>
    </div>
    <div class="table-wrap">
      <table id="dataTable"><thead><tr></tr></thead><tbody></tbody></table>
    </div>
  </section>

  <!-- 汇总历史 -->
  <section class="card">
    <h3 class="section-title">汇总历史 <button class="btn btn-sm" id="btnRefreshSummaries">刷新</button></h3>
    <div class="select-actions">
      <button class="btn btn-sm" id="btnSelectAllSum">全选</button>
      <button class="btn btn-sm" id="btnDeselectAllSum">取消全选</button>
      <button class="btn btn-sm" id="btnBatchDownloadSum" style="color:#1890ff">批量下载</button>
      <button class="btn btn-sm" id="btnBatchDeleteSum" style="color:#ff4d4f">批量删除</button>
      <span id="sumCount" class="count-hint">-</span>
    </div>
    <div class="file-select-table-wrap" style="max-height:400px">
      <table id="summaryTable">
        <thead><tr><th style="width:40px"><input type="checkbox" id="checkAllSum"></th><th>文件名</th><th>生成时间</th><th style="width:100px">操作</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</div>
<script src="/static/app.js"></script>
</body>
</html>
